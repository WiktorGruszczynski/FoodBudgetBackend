[tool.ruff]
target-version = "py312"
line-length = 128
indent-width = 4

[tool.ruff.lint]
ignore=[]
select = [
    "E",   # PEP8 errors (syntax, indentation)
    "F",   # Pyflakes (dead code, unused imports)
    "DJ",  # Django-specific
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "I",   # isort
]
fixable = ["ALL"]
unfixable = []
exclude = [
    ".venv", 
    "**/migrations/**", 
    ".vscode"
]

[tool.ruff.format]
exclude = [
    ".venv",
    "**/migrations/**",
    ".vscode"
]