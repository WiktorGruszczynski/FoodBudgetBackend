[tool.ruff]

# Folder z kodem źródłowym
src = ["src"]

# Wykluczenie folderu z migracjami
extend-exclude = ["*/migrations/*"]

# Wersja Pythona
target-version = "py313"

# Długość linii (Django lubi nieco więcej niż standardowe 79/88)
line-length = 100

[tool.ruff.lint]

# Wybór zestawu reguł (E - błędy, F - Pyflakes, I - sortowanie importów)
select = ["E", "F", "I"]
ignore = []

[tool.ruff.format]
quote-style = "single" # Django standardowo używa pojedynczych cudzysłowów